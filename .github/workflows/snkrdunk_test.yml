name: snkrdunk Inspection

on:
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requests
        run: pip install requests

      - name: Run inspection
        run: python snkrdunk_inspect.py

      - name: Upload HTML dumps
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snkrdunk-html-dumps
          path: dumps/
          retention-days: 7
