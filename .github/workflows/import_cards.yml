name: CARDSTAR Pipeline
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      action:
        description: "執行動作"
        required: true
        type: choice
        options:
          - update_prices
          - discover_cards
          - download_images
          - import_data

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Discover Cards
        if: github.event.inputs.action == 'discover_cards'
        run: python discover_cards.py

      - name: Download Images
        if: github.event.inputs.action == 'download_images'
        run: python download_images.py

      - name: Import Data
        if: github.event.inputs.action == 'import_data'
        run: python cardstar_pipeline.py import
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_D1_DATABASE_ID: ${{ secrets.CF_D1_DATABASE_ID }}
          CF_D1_TOKEN: ${{ secrets.CF_D1_TOKEN }}

      - name: Update Prices & Site
        if: github.event_name == 'schedule' || github.event.inputs.action == 'update_prices'
        run: python update_site.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/ || true
          git diff --cached --quiet || git commit -m "Auto-update $(date +%Y-%m-%d_%H:%M)"
          git push || true
