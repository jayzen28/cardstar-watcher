name: CARDSTAR Pipeline
on:
  workflow_dispatch:
    inputs:
      action:
        description: "執行動作"
        required: true
        type: choice
        options:
          - full
          - import
          - prices
          - site

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run Pipeline
        run: python cardstar_pipeline.py ${{ github.event.inputs.action }}
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_D1_DATABASE_ID: ${{ secrets.CF_D1_DATABASE_ID }}
          CF_D1_TOKEN: ${{ secrets.CF_D1_TOKEN }}

      - name: Upload Site
        if: ${{ github.event.inputs.action == 'full' || github.event.inputs.action == 'site' }}
        uses: actions/upload-artifact@v4
        with:
          name: cardstar-site
          path: site/
