name: CARDSTAR Import & Scrape
on:
  workflow_dispatch:
    inputs:
      action:
        description: "要執行的動作"
        required: true
        type: choice
        options:
          - import_cards
          - scrape_prices
          - both

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Import Cards
        if: ${{ github.event.inputs.action == 'import_cards' || github.event.inputs.action == 'both' }}
        run: python import_svp.py
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_D1_DATABASE_ID: ${{ secrets.CF_D1_DATABASE_ID }}
          CF_D1_TOKEN: ${{ secrets.CF_D1_TOKEN }}

      - name: Scrape Prices
        if: ${{ github.event.inputs.action == 'scrape_prices' || github.event.inputs.action == 'both' }}
        run: python scrape_prices.py
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_D1_DATABASE_ID: ${{ secrets.CF_D1_DATABASE_ID }}
          CF_D1_TOKEN: ${{ secrets.CF_D1_TOKEN }}
